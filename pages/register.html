<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Sign up</title>
</head>
<body>
    <div class="wrapper">
        <div class="login_box">
            <div class="login_header"><span>Sign up</span></div>
            <div class="input_box">
                <input type="email" id="email" class="input-field" required>
                <label for="email" class="label">Email</label>
                <i class="bx bx-envelope icon"></i>
            </div>
            <div class="input_box">
                <input type="password" id="pass" class="input-field" required>
                <label for="pass" class="label">Password</label>
                <i class="bx bx-lock-alt icon"></i>
            </div>
            <div class="input">
                <input type="submit" id="regBtn" class="input-submit" value="Register">
            </div>
            <div class="register" style="margin-top: 15px;">
                <span>Already have an account? <a href="login.html">Sign in</a></span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHO-l0CaHaonoQYO0GUbtNwsJBX1rEewQ",
            authDomain: "suarakan-app.firebaseapp.com",
            projectId: "suarakan-app",
            storageBucket: "suarakan-app.firebasestorage.app",
            messagingSenderId: "373793823249",
            appId: "1:373793823249:web:1cf2752f7380ded0262fb0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('regBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.querySelector('#email').value;
            const password = document.querySelector('#pass').value;

            if (password.length < 6) {
                alert("Password minimal 6 karakter!");
                return;
            }

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                alert("Akun berhasil dibuat! Silakan Login.");
                window.location.href = "login.html";
            } catch (err) {
                alert("Gagal Daftar: " + err.message);
            }
        });
    </script>
</body>
</html>
